name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run unit and interaction tests
        run: |
          set +e
          npm test -- --run > test-output.txt 2>&1
          status=$?
          cat test-output.txt
          exit $status

      - name: Upload failing test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failing-test-output
          path: test-output.txt

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build production bundle
        run: npm run build
