name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - DEPLOYMENT_STATUS.json
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build production site
        run: npm run build

      - name: Verify GitHub Pages asset paths
        run: |
          grep -Eq 'src="/paperplane/assets/[^"]+\.js"' dist/index.html
          grep -Eq 'href="/paperplane/assets/[^"]+\.css"' dist/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify live homepage bundle
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          html="$(curl --fail --silent --show-error --retry 8 --retry-delay 2 "$PAGE_URL")"
          asset_path="$(printf '%s' "$html" | sed -n 's/.*src="\([^"]*assets[^"]*\.js\)".*/\1/p')"
          case "$asset_path" in
            /paperplane/assets/*) ;;
            *) echo "Unexpected or missing script asset path: $asset_path" >&2; exit 1 ;;
          esac
          origin="$(printf '%s' "$PAGE_URL" | sed -E 's#(https?://[^/]+).*#\1#')"
          curl --fail --silent --show-error --retry 8 --retry-delay 2 "$origin$asset_path" >/dev/null

      - name: Verify live app renders in Chrome
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          for attempt in {1..8}; do
            timeout 30s google-chrome \
              --headless=new \
              --no-sandbox \
              --disable-gpu \
              --disable-dev-shm-usage \
              --virtual-time-budget=10000 \
              --dump-dom "${PAGE_URL}?commit=${GITHUB_SHA}&attempt=${attempt}" \
              > live-dom.html 2> chrome.log || true

            if grep -q 'Choose a mission' live-dom.html && grep -q 'Simulation engine ready' live-dom.html; then
              exit 0
            fi

            sleep 5
          done

          echo 'The public page loaded, but the React application did not render.' >&2
          cat live-dom.html >&2 || true
          cat chrome.log >&2 || true
          exit 1

  report:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Record deployment status
        uses: actions/github-script@v8
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const path = 'DEPLOYMENT_STATUS.json'
            const status = {
              build: process.env.BUILD_RESULT,
              deploy: process.env.DEPLOY_RESULT,
              pageUrl: process.env.PAGE_URL || null,
              runUrl: process.env.RUN_URL,
              commit: context.sha,
              recordedAt: new Date().toISOString(),
            }

            let sha
            try {
              const response = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: 'main',
              })
              if (!Array.isArray(response.data)) sha = response.data.sha
            } catch (error) {
              if (error.status !== 404) throw error
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              branch: 'main',
              message: 'chore: record deployment status [skip pages]',
              content: Buffer.from(`${JSON.stringify(status, null, 2)}\n`).toString('base64'),
              sha,
            })
