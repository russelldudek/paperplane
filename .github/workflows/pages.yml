name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - DEPLOYMENT_STATUS.json
      - index.html
      - assets/**
      - .nojekyll
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build production site
        run: npm run build

      - name: Verify GitHub Pages artifact
        run: |
          grep -q 'id="boot-status"' dist/index.html
          grep -q 'compiled-root-v1' dist/index.html
          grep -q 'src="/paperplane/assets/app.js"' dist/index.html
          grep -q 'href="/paperplane/assets/app.css"' dist/index.html
          ! grep -q '/src/main.tsx' dist/index.html
          test -s dist/assets/app.js
          test -s dist/assets/app.css

      - name: Publish compiled site to legacy Pages source
        run: |
          rm -rf assets
          cp -R dist/assets assets
          cp dist/index.html index.html
          touch .nojekyll

          grep -q 'src="/paperplane/assets/app.js"' index.html
          ! grep -q '/src/main.tsx' index.html

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html assets .nojekyll

          if ! git diff --cached --quiet; then
            git commit -m 'chore: publish compiled Pages site [skip ci] [skip pages]'
            git push origin HEAD:main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Wait for compiled root to propagate
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          propagated='false'
          html=''

          for attempt in {1..48}; do
            html="$(curl \
              --fail \
              --silent \
              --show-error \
              --header 'Cache-Control: no-cache' \
              "${PAGE_URL}?deploy=${GITHUB_SHA}&attempt=${attempt}" || true)"

            if printf '%s' "$html" | grep -q 'src="/paperplane/assets/app.js"' \
              && printf '%s' "$html" | grep -q 'href="/paperplane/assets/app.css"' \
              && printf '%s' "$html" | grep -q 'compiled-root-v1' \
              && ! printf '%s' "$html" | grep -q '/src/main.tsx'; then
              propagated='true'
              break
            fi

            sleep 5
          done

          if [ "$propagated" != 'true' ]; then
            echo 'GitHub Pages is still serving repository source instead of compiled output.' >&2
            printf '%s\n' "$html" >&2
            exit 1
          fi

          origin="$(printf '%s' "$PAGE_URL" | sed -E 's#(https?://[^/]+).*#\1#')"
          curl --fail --silent --show-error --header 'Cache-Control: no-cache' "$origin/paperplane/assets/app.js?deploy=${GITHUB_SHA}" >/dev/null
          curl --fail --silent --show-error --header 'Cache-Control: no-cache' "$origin/paperplane/assets/app.css?deploy=${GITHUB_SHA}" >/dev/null

      - name: Verify live app renders in Chrome
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          rendered='false'

          for attempt in {1..12}; do
            timeout 30s google-chrome \
              --headless=new \
              --no-sandbox \
              --disable-gpu \
              --disable-dev-shm-usage \
              --virtual-time-budget=10000 \
              --dump-dom "${PAGE_URL}?render=${GITHUB_SHA}&attempt=${attempt}" \
              > live-dom.html 2> chrome.log || true

            if grep -q 'data-pal-ready="true"' live-dom.html \
              && grep -q 'Choose a mission' live-dom.html \
              && grep -q 'Simulation engine ready' live-dom.html; then
              rendered='true'
              break
            fi

            sleep 5
          done

          if [ "$rendered" != 'true' ]; then
            echo 'The compiled root was public, but the React application did not render.' >&2
            cat live-dom.html >&2 || true
            cat chrome.log >&2 || true
            exit 1
          fi

  report:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Record deployment status
        uses: actions/github-script@v8
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const path = 'DEPLOYMENT_STATUS.json'
            const status = {
              build: process.env.BUILD_RESULT,
              deploy: process.env.DEPLOY_RESULT,
              pageUrl: process.env.PAGE_URL || null,
              runUrl: process.env.RUN_URL,
              commit: context.sha,
              recordedAt: new Date().toISOString(),
            }

            let sha
            try {
              const response = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: 'main',
              })
              if (!Array.isArray(response.data)) sha = response.data.sha
            } catch (error) {
              if (error.status !== 404) throw error
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              branch: 'main',
              message: 'chore: record deployment status [skip pages]',
              content: Buffer.from(`${JSON.stringify(status, null, 2)}\n`).toString('base64'),
              sha,
            })
