name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - DEPLOYMENT_STATUS.json
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build production site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  report:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Record deployment status
        uses: actions/github-script@v8
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const path = 'DEPLOYMENT_STATUS.json'
            const status = {
              build: process.env.BUILD_RESULT,
              deploy: process.env.DEPLOY_RESULT,
              pageUrl: process.env.PAGE_URL || null,
              runUrl: process.env.RUN_URL,
              commit: context.sha,
              recordedAt: new Date().toISOString(),
            }

            let sha
            try {
              const response = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: 'main',
              })
              if (!Array.isArray(response.data)) sha = response.data.sha
            } catch (error) {
              if (error.status !== 404) throw error
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              branch: 'main',
              message: 'chore: record deployment status [skip pages]',
              content: Buffer.from(`${JSON.stringify(status, null, 2)}\n`).toString('base64'),
              sha,
            })
