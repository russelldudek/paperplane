<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#071a2d" />
    <meta name="description" content="Invent, simulate, fold, and test physics-informed paper airplanes." />
    <title>Paper Airplane Lab</title>
    <style>
      #boot-status {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        color: #f7f4ed;
        background: #071a2d;
        font: 600 18px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      #boot-status strong {
        display: block;
        margin-bottom: 8px;
        font-size: 28px;
      }

      #boot-status small {
        display: block;
        max-width: 900px;
        margin: 18px auto 0;
        color: #b9c8d6;
        font: 500 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        overflow-wrap: anywhere;
      }
    </style>
    <script>
      ;(function () {
        var reloadParameter = 'pal-reload='

        function getStatus() {
          return document.getElementById('boot-status')
        }

        function showStatus(title, message, diagnostic) {
          var status = getStatus()
          if (!status) return
          while (status.firstChild) status.removeChild(status.firstChild)

          var wrapper = document.createElement('div')
          var heading = document.createElement('strong')
          var copy = document.createElement('span')
          heading.textContent = title
          copy.textContent = message
          wrapper.appendChild(heading)
          wrapper.appendChild(copy)

          if (diagnostic) {
            var details = document.createElement('small')
            details.textContent = diagnostic
            wrapper.appendChild(details)
          }

          status.appendChild(wrapper)
        }

        function appIsReady() {
          return document.documentElement.getAttribute('data-pal-ready') === 'true'
        }

        function scriptDiagnostic() {
          var script = document.querySelector('script[type="module"][src]')
          var scriptUrl = script && script.src

          if (!scriptUrl) {
            showStatus('Paper Airplane Lab could not start.', 'The compiled application script is missing.', 'URL: ' + window.location.href)
            return
          }

          var request = new XMLHttpRequest()
          request.open('GET', scriptUrl + '?diagnostic=' + Date.now(), true)
          request.onreadystatechange = function () {
            if (request.readyState !== 4 || appIsReady()) return
            var available = request.status >= 200 && request.status < 300
            showStatus(
              'Paper Airplane Lab could not start.',
              available ? 'The application file downloaded, but this browser did not execute it.' : 'The browser could not download the application file.',
              'HTTP ' + request.status + ' | Script: ' + scriptUrl + ' | Browser: ' + navigator.userAgent,
            )
          }
          request.onerror = function () {
            if (!appIsReady()) showStatus('Paper Airplane Lab could not start.', 'The application file request was blocked or interrupted.', 'Script: ' + scriptUrl)
          }
          request.send()
        }

        window.addEventListener('error', function (event) {
          if (appIsReady()) return
          var target = event.target
          var source = target && target.src ? 'Source: ' + target.src : ''
          showStatus('Paper Airplane Lab could not start.', event.message || 'A required application file did not load.', source + ' Browser: ' + navigator.userAgent)
        }, true)

        window.addEventListener('unhandledrejection', function (event) {
          if (appIsReady()) return
          var reason = event.reason
          showStatus('Paper Airplane Lab could not start.', reason && reason.message ? reason.message : 'The application encountered an unexpected startup error.', 'Browser: ' + navigator.userAgent)
        })

        window.setTimeout(function () {
          if (appIsReady() || !getStatus()) return
          if (window.location.search.indexOf(reloadParameter) === -1) {
            var separator = window.location.search ? '&' : '?'
            window.location.replace(window.location.pathname + window.location.search + separator + reloadParameter + Date.now() + window.location.hash)
            return
          }
          showStatus('Paper Airplane Lab is checking its application file.', 'The automatic cache refresh completed. Running a startup diagnostic now…', 'URL: ' + window.location.href)
          scriptDiagnostic()
        }, 8000)
      })()
    </script>
  </head>
  <body>
    <div id="root">
      <main id="boot-status" role="status" aria-live="polite">
        <div>
          <strong>Paper Airplane Lab is loading…</strong>
          <span>Preparing the flight engineering workspace.</span>
          <small>Boot profile: compiled-root-v1</small>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
